# railway.toml — shared build config for all three cron services.
# Each service's startCommand and cronSchedule are set per-service
# in the Railway dashboard (Settings → Deploy).
#
# Services:
#   email-audit  → python workers/email_audit.py   cron: 0 5 * * *   (08:00 IL daily)
#   diy-log      → python workers/diy_log.py        cron: 0 4 * * *   (07:00 IL daily)
#   weekly-plan  → python workers/weekly_plan.py    cron: 0 15 * * 0  (18:00 IL Sunday)

[build]
builder = "nixpacks"

# Default start command — each Railway service overrides this in
# Settings → Deploy → Start Command with its own worker script.
[deploy]
startCommand = "python workers/email_audit.py"
